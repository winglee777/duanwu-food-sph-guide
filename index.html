<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>粽香启夏 · 端午食饮赛道爆品趋势</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f6f5f2; --paper:#fff; --ink:#1a1a1a; --sub:#4a4a4a; --mute:#8a8580;
  --bd:#e0ddd6; --bd-light:#ecebe6;
  --accent:#0d6b52; --accent-bg:#e8f3ee;
  --warn:#c2410c; --warn-bg:#fef3e7;
  --blue:#0652dd; --blue-bg:#eef3fc;
  --gold:#b8860b; --gold-bg:#fdf6e3;
  --red:#c0392b; --red-bg:#fbecea;
  --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:"Noto Sans SC",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6;letter-spacing:.01em}
body{padding:0 0 60px}
.hero{background:linear-gradient(135deg,#1a1a1a 0%,#2c2c2c 60%,#0d6b52 130%);color:#fff;padding:36px 48px;position:relative;overflow:hidden}
.hero::before{content:'端午';position:absolute;right:-30px;top:-20px;font-size:200px;font-weight:900;color:rgba(255,255,255,.04);font-family:'Noto Sans SC';line-height:1}
.hero h1{font-size:28px;font-weight:900;margin-bottom:14px;letter-spacing:.02em;position:relative;z-index:1}
.hero-meta{display:flex;flex-direction:column;gap:5px;position:relative;z-index:1}
.hero-meta .line{font-size:13px;color:rgba(255,255,255,.8);font-weight:500}
.hero-meta .line .lbl{display:inline-block;width:80px;color:rgba(255,255,255,.5);font-weight:400}
.hero-meta .line b{color:#ffd966;font-weight:700}
.container{max-width:1480px;margin:0 auto;padding:32px 48px}
.section-hd{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--ink)}
.section-hd .num{font-family:'Inter',sans-serif;font-size:36px;font-weight:900;line-height:1;color:var(--ink)}
.section-hd .title{font-size:20px;font-weight:900;letter-spacing:.02em}
.section-hd .desc{font-size:12px;color:var(--mute);font-weight:500;margin-left:auto}

/* 整体核心洞察 */
.overall-card{background:linear-gradient(135deg,#fafaf7 0%,#fff 100%);border:1px solid var(--ink);border-radius:12px;padding:24px 28px;margin-bottom:36px;box-shadow:var(--shadow)}
.overall-card .oh-title{font-size:20px;font-weight:900;color:var(--ink);margin-bottom:4px;display:flex;align-items:center;gap:10px}
.overall-card .oh-title::before{content:'';width:5px;height:24px;background:var(--accent);border-radius:2px}
.overall-card .oh-subtitle{font-size:13px;color:var(--mute);margin-bottom:18px;margin-left:15px;font-weight:500}
/* 整体洞察底部·拓展机会汇总条 */
.ov-gap-summary{margin-top:20px;padding:14px 18px;background:linear-gradient(135deg,#fff5f5 0%,#ffe9e6 100%);border:1px solid #ff7a6c44;border-radius:10px}
.ov-gap-summary .ov-gap-hd{font-size:14px;color:#dc2626;margin-bottom:10px}
.ov-gap-summary .ov-gap-hd span{font-size:11px;color:#9a3412;font-weight:400;margin-left:6px}
.ov-gap-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px}
.ov-gap-item{background:#fff;border:1px solid #fecaca;color:#7c2d12;padding:8px 12px;border-radius:6px;font-size:12px;line-height:1.6}
.ov-gap-item b{color:#991b1b;margin-right:6px}
.overall-points{display:flex;flex-direction:column;gap:12px}
.ov-point{padding:13px 16px;background:#fff;border:1px solid var(--bd-light);border-radius:8px;border-left:4px solid var(--accent);display:flex;gap:14px;align-items:flex-start}
.ov-point:nth-child(2){border-left-color:var(--blue)}
.ov-point:nth-child(3){border-left-color:var(--gold)}
.ov-point:nth-child(4){border-left-color:var(--red)}
.ov-point:nth-child(5){border-left-color:#7c3aed}
.ov-tag{flex-shrink:0;font-size:10px;font-weight:800;padding:3px 9px;border-radius:4px;background:var(--accent-bg);color:var(--accent);letter-spacing:.05em;white-space:nowrap}
.ov-point:nth-child(2) .ov-tag{background:var(--blue-bg);color:var(--blue)}
.ov-point:nth-child(3) .ov-tag{background:var(--gold-bg);color:var(--gold)}
.ov-point:nth-child(4) .ov-tag{background:var(--red-bg);color:var(--red)}
.ov-point:nth-child(5) .ov-tag{background:#f0e8f3;color:#7c3aed}
.ov-body{flex:1}
.ov-body .ov-t{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:5px;line-height:1.5}
.ov-body .ov-d{font-size:12.5px;color:var(--sub);line-height:1.7;font-weight:400}
.ov-body .ov-d b{color:var(--ink);font-weight:700}

/* 品类洞察卡片 */
.insight-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:36px}
.insight-card{background:var(--paper);border:1px solid var(--bd);border-radius:10px;padding:18px 20px;box-shadow:var(--shadow);position:relative}
.ic-hd{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px dashed var(--bd)}
.ic-hd .emoji{font-size:24px}
.ic-hd .cat-name{font-size:17px;font-weight:900;color:var(--ink)}
.ic-hd .rank{margin-left:auto;font-family:'Inter',sans-serif;font-size:11px;font-weight:800;padding:3px 8px;border-radius:4px;background:var(--ink);color:#fff}
.ic-dims{font-size:11px;color:var(--mute);margin-bottom:12px;line-height:1.5}
.ic-dims b{color:var(--sub);font-weight:700}
.ic-insight{background:var(--accent-bg);padding:12px 14px;border-radius:7px;border-left:3px solid var(--accent);margin-bottom:14px}
.ic-insight ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
.ic-insight li{font-size:12.5px;color:var(--ink);line-height:1.6;padding-left:18px;position:relative;font-weight:400}
.ic-insight li::before{content:'';position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.ic-insight li b{color:var(--ink);font-weight:700}
.ic-subs{display:flex;flex-direction:column;gap:8px}
.sub-item{padding:11px 13px;border:1px solid var(--bd-light);border-radius:6px;background:#fafaf7;transition:all .15s}
.sub-item:hover{border-color:var(--accent);background:#f7f9f8}
.sub-item.zongzi{border-color:var(--warn);background:#fef9f1;border-left:3px solid var(--warn)}
.sub-item .sub-hd{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sub-item .sub-name{font-size:13px;font-weight:800;color:var(--ink)}
.sub-item .sub-sales{font-family:'Inter',sans-serif;font-size:11px;font-weight:800;color:var(--accent);margin-left:auto;white-space:nowrap;background:#fff;padding:2px 7px;border-radius:4px;border:1px solid var(--bd-light)}
.sub-item.zongzi .sub-sales{color:var(--warn);border-color:#f7c794}
.sub-item .sub-attr{font-size:11.5px;color:var(--sub);line-height:1.55;margin-bottom:4px}
.sub-item .sub-rep{font-size:11px;color:var(--mute);font-style:italic;border-top:1px dotted var(--bd-light);padding-top:5px;margin-top:5px}
.sub-item .sub-rep b{color:var(--sub);font-style:normal;font-weight:700}
/* 待拓展 / 已覆盖 模块 */
.ic-gap{margin-top:14px;padding:12px 14px;border-radius:10px;font-size:12px;line-height:1.6}
.ic-gap.warning{background:linear-gradient(135deg,#fff5f5,#ffe9e6);border:1px solid #ff7a6c33;box-shadow:0 1px 0 #ff7a6c1a}
.ic-gap.covered{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #22c55e33}
.ic-gap .gap-hd{display:flex;align-items:center;gap:8px;font-size:13px;margin-bottom:8px}
.ic-gap .gap-icon{font-size:15px}
.ic-gap.warning .gap-hd b{color:#dc2626}
.ic-gap.covered .gap-hd b{color:#15803d}
.ic-gap .gap-stat{margin-left:auto;font-size:11px;color:var(--mute);font-weight:500}
.ic-gap .gap-body{color:#555}
.ic-gap.covered .gap-body{color:#166534}
.gap-item{padding:8px 10px;background:rgba(255,255,255,.7);border-radius:6px;margin-bottom:6px;border-left:3px solid #dc2626}
.gap-item:last-child{margin-bottom:0}
.gap-name{font-weight:700;color:#991b1b;margin-bottom:4px;font-size:12.5px}
.gap-examples{font-size:11px;color:#7c2d12;line-height:1.7}
.gap-examples b{color:#9a3412;margin-right:4px}
.gap-eg{display:inline-block;background:#fff;border:1px solid #fecaca;color:#9f1239;padding:2px 8px;border-radius:99px;margin:2px 4px 2px 0;font-size:10.5px}
/* 品种 chip 网格 */
.ic-chips-wrap{margin-top:14px;padding:12px 14px;background:#fafaf7;border:1px solid var(--bd-light);border-radius:8px}
.ic-chips-hd{font-size:11.5px;color:var(--mute);margin-bottom:8px;line-height:1.6}
.ic-chips-hd b{color:var(--ink);font-weight:700}
.ic-chips{display:flex;flex-wrap:wrap;gap:6px}
.prod-chip{display:inline-block;padding:4px 10px;border-radius:99px;font-size:11.5px;font-weight:600;cursor:default;transition:all .15s;line-height:1.4}
.prod-chip.chip-yes{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.prod-chip.chip-yes:hover{background:#bbf7d0;border-color:#22c55e}
.prod-chip.chip-no{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.prod-chip.chip-no:hover{background:#fecaca;border-color:#dc2626}
/* 卡片底部·拓展机会总结 */
.ic-gap-summary{margin-top:12px;padding:10px 14px;background:linear-gradient(135deg,#fff5f5 0%,#ffe9e6 100%);border-left:3px solid #dc2626;border-radius:6px;font-size:12px;color:#7c2d12;line-height:1.7}
.ic-gap-summary.covered{background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 100%);border-left-color:#22c55e;color:#166534}
.ic-gap-summary b{color:#dc2626;font-weight:800;margin-right:4px}
.ic-gap-summary.covered b{color:#15803d}
.ic-gap-summary .gap-list{font-weight:700;color:#991b1b;margin-left:4px}
.filter-bar{background:var(--paper);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;gap:14px;align-items:center;flex-wrap:wrap;box-shadow:var(--shadow);position:sticky;top:0;z-index:10}
.filter-label{font-size:12px;font-weight:700;color:var(--sub);margin-right:4px}
.cat-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.chip{padding:6px 12px;border:1px solid var(--bd);border-radius:18px;font-size:12px;font-weight:600;background:var(--paper);cursor:pointer;transition:all .15s;color:var(--sub);user-select:none}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--ink);border-color:var(--ink);color:#fff;font-weight:800}
.chip .cnt{font-family:'Inter',sans-serif;font-size:10px;opacity:.65;margin-left:4px}
.search-box{flex-shrink:0;position:relative}
.search-box input{width:240px;padding:8px 14px 8px 32px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-family:inherit;background:var(--paper);outline:none;transition:border-color .15s}
.search-box input:focus{border-color:var(--accent)}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.6}
.sort-select{padding:8px 12px;border:1px solid var(--bd);border-radius:6px;font-size:12px;background:var(--paper);font-family:inherit;cursor:pointer;color:var(--sub);font-weight:600}
.adq-tag{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.adq-tag.adq-yes{background:#dcfce7;color:#15803d;border:1px solid #86efac}
.adq-tag.adq-no{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.table-wrap{background:var(--paper);border:1px solid var(--bd);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
.summary-bar{padding:10px 18px;background:#fafaf7;border-bottom:1px solid var(--bd);font-size:12px;color:var(--sub);display:flex;gap:18px;flex-wrap:wrap}
.summary-bar b{color:var(--ink);font-family:'Inter',sans-serif;font-weight:800}
.summary-bar .src-tip{margin-left:auto;color:var(--warn);font-size:11px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
thead th{background:#f3f1eb;padding:10px 8px;text-align:left;font-weight:800;font-size:11px;color:var(--sub);border-bottom:1.5px solid var(--bd);position:sticky;top:0;letter-spacing:.03em}
tbody td{padding:8px;border-bottom:1px solid var(--bd-light);vertical-align:top}
tbody tr:hover{background:#fcfbf6}
.col-rank{width:50px;text-align:center;font-family:'Inter',sans-serif;font-weight:800;color:var(--mute)}
.col-img{width:60px}
.col-img img{width:48px;height:48px;object-fit:cover;border-radius:4px;background:#f0eee8;border:1px solid var(--bd-light)}
.col-name .pn{font-size:12px;color:var(--ink);font-weight:500;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.col-cat{width:130px}
.cat-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;background:var(--accent-bg);color:var(--accent);white-space:nowrap}
.cat-tag[data-cat="粮油调味"]{background:#e8f3ee;color:#0d6b52}
.cat-tag[data-cat="休闲食品"]{background:#fbecea;color:#c0392b}
.cat-tag[data-cat="传统滋补"]{background:#fdf6e3;color:#b8860b}
.cat-tag[data-cat="饮料冲调"]{background:#eef3fc;color:#0652dd}
.cat-tag[data-cat="乳品冷饮"]{background:#f0e8f3;color:#7c3aed}
.cat-tag[data-cat="生鲜"]{background:#fef3e7;color:#c2410c}
.cat-tag[data-cat="茗茶"]{background:#e8f3ee;color:#0d6b52}
.cat-tag[data-cat="酒类"]{background:#fbecea;color:#7c2d12}
.cat-tag[data-cat="保健食品/营养补充"]{background:#eef3fc;color:#075985}
.cat-tag[data-cat="宠物生活"]{background:#f0e8f3;color:#6b21a8}
.col-price{width:90px;font-size:11px;color:var(--sub);font-family:'Inter',sans-serif;font-weight:600}
.col-shop{width:140px;font-size:11px;color:var(--mute);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.col-sales{width:80px;text-align:right;font-family:'Inter',sans-serif;font-weight:800;color:var(--accent);font-size:12px}
.col-gmv{width:100px;text-align:right;font-family:'Inter',sans-serif;font-weight:700;color:var(--ink);font-size:11px}
.col-live{width:80px;text-align:right;font-family:'Inter',sans-serif;font-weight:600;color:var(--blue);font-size:11px}
.pager{padding:14px 18px;display:flex;justify-content:center;align-items:center;gap:8px;border-top:1px solid var(--bd);background:#fafaf7}
.pager button{padding:6px 12px;border:1px solid var(--bd);border-radius:5px;background:var(--paper);font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;color:var(--sub)}
.pager button:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.pager button:disabled{opacity:.4;cursor:not-allowed}
.pager .page-info{font-family:'Inter',sans-serif;font-size:12px;color:var(--sub);font-weight:700;margin:0 8px}
.empty-row{text-align:center;padding:40px;color:var(--mute);font-size:13px}
.footer{text-align:center;padding:20px;color:var(--mute);font-size:11px;margin-top:30px}
</style>
</head>
<body>

<div class="hero">
  <h1>粽香启夏 · 端午食饮赛道爆品趋势</h1>
  <div class="hero-meta">
    <div class="line"><b>2025年5月11日 — 2025年6月7日</b>（4周端午周期）</div>
    <div class="line">数据来源：<b>视频号小店全域 TOP 商品（非全量）</b></div>
  </div>
</div>

<div class="container">

<div class="overall-card" id="overall-card"></div>

<div class="section-hd">
  <div class="num">01</div>
  <div class="title">10 大品类趋势洞察</div>
  <div class="desc">按销量绝对值降序排列 · 5 维属性高频值抽象</div>
</div>

<div class="insight-grid" id="insight-grid"></div>

<div class="section-hd" style="margin-top:24px">
  <div class="num">02</div>
  <div class="title">分品类 TOP500 商品排行榜</div>
  <div class="desc">点击品类切换 · 支持搜索/排序 · 如需中长尾数据请联系 wingsdli</div>
</div>

<div class="filter-bar">
  <span class="filter-label">品类:</span>
  <div class="cat-chips" id="cat-chips"></div>
  <div class="search-box"><input type="text" id="search-input" placeholder="搜索商品名称/店铺…"></div>
  <select class="sort-select" id="adq-select">
    <option value="all">ADQ 全部</option>
    <option value="yes">🟢 类似品在投</option>
    <option value="no">🔴 暂无类似品</option>
  </select>
  <select class="sort-select" id="sort-select">
    <option value="rank">综合排行</option>
    <option value="sales">销量↓</option>
    <option value="gmv">销售额↓</option>
    <option value="live_sales">直播销量↓</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <colgroup>
      <col style="width:50px"><col style="width:60px"><col><col style="width:130px"><col style="width:100px"><col style="width:90px"><col style="width:140px"><col style="width:80px"><col style="width:100px"><col style="width:80px">
    </colgroup>
    <thead>
      <tr><th>排行</th><th>主图</th><th>商品名称</th><th>品类</th><th>ADQ状态</th><th>价格</th><th>来源店铺</th><th>销量</th><th>销售额</th><th>直播销量</th></tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="pager" id="pager"></div>
</div>

</div>

<div class="footer">端午时令 · 视频号食品饮料赛道洞察 · 数据 by 友望 · 分析 by Wing · 全量数据如需要请联系 wingsdli</div>
<div class="footer" style="font-size:12px;color:#7A8C7F;border-top:1px dashed #D7E4DA;margin-top:8px;padding-top:12px">
  本页累计访问 <span id="busuanzi_value_site_pv" style="color:#C1272D;font-weight:600">…</span> 次 ·
  独立访客 <span id="busuanzi_value_site_uv" style="color:#C1272D;font-weight:600">…</span> 人
</div>
<script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<script>
// ===== 数据从外部 JSON 加载（v2: 已纠正商家上架时的品类误归类） =====
let RECORDS = [];
let INSIGHTS = {};
let OVERALL = {};
let STATS = {};
let CATS = [];

async function loadData(){
  const [recs, ins, ovr, sts] = await Promise.all([
    fetch('./data/records.json').then(r=>r.json()),
    fetch('./data/insights.json').then(r=>r.json()),
    fetch('./data/overall.json').then(r=>r.json()),
    fetch('./data/stats.json').then(r=>r.json())
  ]);
  RECORDS = recs;
  INSIGHTS = ins;
  OVERALL = ovr;
  STATS = sts;
  CATS = Object.keys(STATS);
}

const state = { cat:'全部', search:'', sort:'rank', adq:'all', page:1, pageSize:50 };
const fmt = n => n>=10000? (n/10000).toFixed(1)+'w' : n.toLocaleString();
const fmtMoney = n => '¥'+(n>=10000? (n/10000).toFixed(1)+'w' : n.toLocaleString());

function renderOverall(){
  const card = document.getElementById('overall-card');
  const points = OVERALL.points.map(p=>`
    <div class="ov-point">
      <span class="ov-tag">${p.tag}</span>
      <div class="ov-body">
        <div class="ov-t">${p.title}</div>
        <div class="ov-d">${p.desc}</div>
      </div>
    </div>
  `).join('');
  card.innerHTML = `
    <div class="oh-title">${OVERALL.title}</div>
    <div class="oh-subtitle">${OVERALL.subtitle}</div>
    <div class="overall-points">${points}</div>
  `;
}

function renderInsights(){
  const grid = document.getElementById('insight-grid');
  // 按销量降序
  const sortedCats = [...CATS].sort((a,b)=>(STATS[b]?.total_sales||0)-(STATS[a]?.total_sales||0));
  sortedCats.forEach((cat,idx)=>{
    const ins = INSIGHTS[cat];
    if(!ins) return;
    const card = document.createElement('div');
    card.className = 'insight-card';
    // 前3个核心子方向
    const subs = (ins.sub_categories||[]).slice(0,3);
    const insightLis = (ins.insight_points||[]).map(p=>`<li>${p}</li>`).join('');
    // chip 数据：来自 ad_match
    const am = ins.ad_match||{};
    const chips = am.chips||[];
    const gaps = am.gaps||[];
    const chipsHtml = chips.length?`<div class="ic-chips-wrap">
      <div class="ic-chips-hd">📌 该品类 TOP <b>${chips.length}</b> 细分品种 · ADQ 在投比对（绿=类似品在投·建议放大；红=暂无类似品·重点拓展）</div>
      <div class="ic-chips">${chips.map(c=>{
        const cls = c.covered?'chip-yes':'chip-no';
        const icon = c.covered?'🟢':'🔴';
        const tip = c.examples&&c.examples.length?`类似在投：${c.examples[0].slice(0,40)}`:'ADQ暂无类似品在投';
        return `<span class="prod-chip ${cls}" title="${tip.replace(/"/g,'&quot;')}">${icon} ${c.name}</span>`;
      }).join('')}</div>
    </div>`:'';
    const gapSummary = gaps.length?`<div class="ic-gap-summary"><b>🚨 拓展机会</b>：以下 <b>${gaps.length}</b> 个品种 ADQ 暂无类似品在投，建议重点拓展 → <span class="gap-list">${gaps.join(' · ')}</span></div>`:`<div class="ic-gap-summary covered"><b>✅ 全覆盖</b>：该品类 TOP 品种 ADQ 均已有类似品在投，建议加大投放力度</div>`;
    card.innerHTML = `
      <div class="ic-hd">
        <span class="emoji">${ins.emoji}</span>
        <span class="cat-name">${cat}</span>
        <span class="rank">No.${idx+1}</span>
      </div>
      <div class="ic-dims"><b>关键属性维度：</b>${ins.dims.join(' · ')||'—'}</div>
      <div class="ic-insight"><ul>${insightLis}</ul></div>
      ${subs.length?`<div class="ic-subs">${subs.map(s=>{
        const isZongzi = s.name.includes('粽子') || s.name.includes('端午厨房');
        return `<div class="sub-item${isZongzi?' zongzi':''}">
          <div class="sub-hd"><span class="sub-name">${s.name}</span></div>
          <div class="sub-attr">${s.attr}</div>
          <div class="sub-rep"><b>代表商品：</b>${s.rep}</div>
        </div>`;
      }).join('')}</div>`:''}
      ${chipsHtml}
      ${gapSummary}
    `;
    grid.appendChild(card);
  });
}

function renderChips(){
  const wrap = document.getElementById('cat-chips');
  const all = ['全部',...CATS];
  wrap.innerHTML = all.map(c=>{
    const cnt = c==='全部'? RECORDS.length : RECORDS.filter(r=>r.cat===c).length;
    return `<div class="chip ${state.cat===c?'active':''}" data-cat="${c}">${c}<span class="cnt">${cnt}</span></div>`;
  }).join('');
  wrap.querySelectorAll('.chip').forEach(el=>{
    el.addEventListener('click',()=>{
      state.cat = el.dataset.cat;
      state.page = 1;
      renderChips(); renderTable();
    });
  });
}

function getFiltered(){
  let rows = RECORDS;
  if(state.cat!=='全部') rows = rows.filter(r=>r.cat===state.cat);
  if(state.search){
    const q = state.search.toLowerCase();
    rows = rows.filter(r=>r.name.toLowerCase().includes(q) || (r.shop||'').toLowerCase().includes(q));
  }
  if(state.adq==='yes') rows = rows.filter(r=>r.ad_status==='是');
  else if(state.adq==='no') rows = rows.filter(r=>r.ad_status!=='是');
  const key = state.sort;
  if(key==='rank') rows = [...rows].sort((a,b)=>a.rank-b.rank);
  else rows = [...rows].sort((a,b)=>(b[key]||0)-(a[key]||0));
  return rows;
}

function renderTable(){
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total/state.pageSize));
  if(state.page>totalPages) state.page = totalPages;
  const start = (state.page-1)*state.pageSize;
  const pageRows = filtered.slice(start, start+state.pageSize);
  const tbody = document.getElementById('tbody');
  if(pageRows.length===0){
    tbody.innerHTML = '<tr><td colspan="10" class="empty-row">暂无数据，调整筛选条件试试 ~</td></tr>';
  } else {
    tbody.innerHTML = pageRows.map(r=>`
      <tr>
        <td class="col-rank">${r.rank}</td>
        <td class="col-img">${r.img? `<img src="${r.img}" loading="lazy" onerror="this.style.opacity=0.2">`:'<div style="width:48px;height:48px;background:#f0eee8;border-radius:4px"></div>'}</td>
        <td class="col-name"><div class="pn" title="${r.name.replace(/"/g,'&quot;')}">${r.name}</div></td>
        <td class="col-cat"><span class="cat-tag" data-cat="${r.cat}">${r.cat}</span></td>
        <td class="col-adq">${r.ad_status==='是'?'<span class="adq-tag adq-yes">🟢 类似品在投</span>':'<span class="adq-tag adq-no">🔴 暂无类似品</span>'}</td>
        <td class="col-price">${r.price}</td>
        <td class="col-shop" title="${r.shop}">${r.shop}</td>
        <td class="col-sales">${r.sales.toLocaleString()}</td>
        <td class="col-gmv">${fmtMoney(Math.round(r.gmv))}</td>
        <td class="col-live">${r.live_sales? r.live_sales.toLocaleString():'—'}</td>
      </tr>
    `).join('');
  }
  const pager = document.getElementById('pager');
  pager.innerHTML = `
    <button id="prev" ${state.page<=1?'disabled':''}>← 上一页</button>
    <span class="page-info">第 ${state.page} / ${totalPages} 页（每页 ${state.pageSize} 条）</span>
    <button id="next" ${state.page>=totalPages?'disabled':''}>下一页 →</button>
  `;
  document.getElementById('prev').onclick = ()=>{ if(state.page>1){state.page--;renderTable();window.scrollTo({top:document.querySelector('.filter-bar').offsetTop-80,behavior:'smooth'})} };
  document.getElementById('next').onclick = ()=>{ if(state.page<totalPages){state.page++;renderTable();window.scrollTo({top:document.querySelector('.filter-bar').offsetTop-80,behavior:'smooth'})} };
}

document.getElementById('search-input').addEventListener('input',e=>{
  state.search = e.target.value.trim();
  state.page = 1;
  renderTable();
});
document.getElementById('sort-select').addEventListener('change',e=>{
  state.sort = e.target.value;
  state.page = 1;
  renderTable();
});
document.getElementById('adq-select').addEventListener('change',e=>{
  state.adq = e.target.value;
  state.page = 1;
  renderTable();
});

// 异步启动：先加载 JSON，再渲染
loadData().then(() => {
  renderOverall();
  renderInsights();
  renderChips();
  renderTable();
}).catch(err => {
  document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#C1272D;font-size:16px">数据加载失败：' + err.message + '<br><br>请确认 data/ 目录下 records.json / insights.json / overall.json / stats.json 都存在。</div>';
  console.error(err);
});
</script>
</body>
